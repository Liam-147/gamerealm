<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Games - GameHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #F2F2F7;
        }
        .game-card {
            transition: transform 0.3s ease;
        }
        .game-card:hover {
            transform: translateY(-5px);
        }
    </style>
</head>
<body>
    <nav class="bg-white shadow-lg fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="text-2xl font-bold text-[#007AFF]">GameHub</a>
                <a href="index.html" class="text-gray-600 hover:text-[#007AFF]">Back to Home</a>
            </div>
        </div>
    </nav>

    <main class="mt-20 p-4">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-3xl font-bold mb-8">Arcade Games</h1>
            
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                <!-- Rise Up -->
                <a href="game-details.html?game=rise-up" class="game-card bg-white rounded-lg shadow-md overflow-hidden">
                    <img src="https://img.cdn.famobi.com/portal/html5games/images/tmp/RiseUpTeaser.jpg" 
                         alt="Rise Up" 
                         class="w-full h-48 object-cover">
                    <div class="p-4">
                        <h3 class="font-semibold mb-2">Rise Up</h3>
                        <p class="text-sm text-gray-600">Protect the balloon as it rises to new heights</p>
                    </div>
                </a>

                <!-- Giant Rush -->
                <a href="game-details.html?game=giant-rush" class="game-card bg-white rounded-lg shadow-md overflow-hidden">
                    <img src="https://img.cdn.famobi.com/portal/html5games/images/tmp/GiantRushTeaser.jpg" 
                         alt="Giant Rush" 
                         class="w-full h-48 object-cover">
                    <div class="p-4">
                        <h3 class="font-semibold mb-2">Giant Rush</h3>
                        <p class="text-sm text-gray-600">Run, merge and battle with giants</p>
                    </div>
                </a>

                <!-- 添加更多街机游戏 -->
            </div>
        </div>
    </main>
</body>
</html>
