<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Details - GameHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-white shadow-lg fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="text-2xl font-bold text-[#007AFF]">GameHub</a>
                <button onclick="history.back()" class="text-gray-600 hover:text-[#007AFF]">Back</button>
            </div>
        </div>
    </nav>

    <main class="mt-20 p-4">
        <div class="max-w-4xl mx-auto">
            <div class="bg-white rounded-lg shadow-md p-6">
                <img src="" id="gameImage" alt="Game Preview" class="w-full h-64 object-cover rounded-lg mb-6">
                
                <h1 id="gameTitle" class="text-3xl font-bold mb-4"></h1>
                <p id="gameDescription" class="text-gray-600 mb-6"></p>
                
                <button onclick="startGame()" 
                        class="bg-[#007AFF] text-white px-8 py-3 rounded-lg font-semibold hover:bg-[#0066CC] transition-colors">
                    Start Game
                </button>
            </div>
        </div>
    </main>

    <script>
        // 获取游戏信息并显示
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game');
        
        // 这里应该是从数据中获取游戏信息
        const gameData = {
            'color-fill-3d': {
                title: 'Color Fill 3D',
                image: 'https://img.cdn.famobi.com/portal/html5games/images/tmp/ColorFill3dTeaser.jpg',
                description: '在 Color Fill 3D 中，您的目标是通过在空白处移动块来用颜色填充整个网格...',
                url: 'https://play.famobi.com/color-fill-3d'
            }
            // 添加更多游戏数据
        };

        if (gameData[gameId]) {
            document.getElementById('gameTitle').textContent = gameData[gameId].title;
            document.getElementById('gameImage').src = gameData[gameId].image;
            document.getElementById('gameDescription').textContent = gameData[gameId].description;
        }

        function startGame() {
            if (gameData[gameId]) {
                window.location.href = `game.html?game=${gameId}`;
            }
        }
    </script>
</body>
</html>
