<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Game - GameHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900">
    <nav class="bg-white shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="text-2xl font-bold text-[#007AFF]">GameHub</a>
                <button onclick="history.back()" class="text-gray-600 hover:text-[#007AFF]">Exit Game</button>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4">
        <div class="aspect-w-16 aspect-h-9">
            <iframe id="gameFrame" 
                    class="w-full h-[80vh] border-none"
                    allowfullscreen>
            </iframe>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game');
        
        const gameUrls = {
            'color-fill-3d': 'https://play.famobi.com/color-fill-3d',
            // 添加更多游戏
        };

        if (gameId && gameUrls[gameId]) {
            document.getElementById('gameFrame').src = gameUrls[gameId];
        }
    </script>
</body>
</html>
